name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JSON manifests parse
        run: |
          set -e
          for f in plugin.json .claude-plugin/marketplace.json hooks/hooks.json; do
            echo "checking $f"
            python3 -c "import json; json.load(open('$f'))"
          done

      - name: Run self-test
        run: ./scripts/validate.sh

      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
